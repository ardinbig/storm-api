services:
  database:
    image: postgres:18-bookworm
    restart: unless-stopped
    environment:
      POSTGRES_DB: stormdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
      - ./migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
      - ./migrations/002_agent_station_link.sql:/docker-entrypoint-initdb.d/002_agent_station_link.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d stormdb"]
      interval: 10s
      timeout: 3s
      retries: 5

  redis:
    image: redis:8-bookworm
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://postgres:postgres@database:5432/stormdb
      REDIS_URL: redis://redis:6379
      APP_ADDR: 0.0.0.0:3000
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-random-64-char-string-in-production}
      MAX_DB_CONNECTIONS: ${MAX_DB_CONNECTIONS:-10}
      RUST_LOG: ${RUST_LOG:-storm_api=info,tower_http=info}
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

volumes:
  pgdata:
  redisdata:
