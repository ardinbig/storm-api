name: API workflow

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_LOG: info

jobs:

  # Check code formatting and lints the codebase using rustfmt and clippy.
  lint:
    name: Code Linting & Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust Toolchain (clippy & rustfmt)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo Dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check Rust Formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy Linter
        run: cargo clippy --all-targets --all-features -- -D warnings

  # Run all unit tests after linting passes, ensuring core logic correctness without external dependencies.
  unit-tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo Dependencies
        uses: Swatinem/rust-cache@v2

      - name: Execute Unit Tests
        run: cargo test --all --locked

  # Runs integration tests with PostgreSQL and Redis services, applies DB migrations,
  # and ensures the app works end-to-end with real dependencies.
  integration-tests:
    name: Run Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    services:
      postgres:
        image: postgres:18-bookworm
        env:
          POSTGRES_USER: storm
          POSTGRES_PASSWORD: storm_secret
          POSTGRES_DB: storm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:8-bookworm
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo Dependencies
        uses: Swatinem/rust-cache@v2

      - name: Cache sqlx CLI Binary
        id: cache-sqlx
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/sqlx
          key: sqlx-cli-${{ runner.os }}-0.3

      - name: Install sqlx CLI (if missing)
        if: steps.cache-sqlx.outputs.cache-hit != 'true'
        run: cargo install sqlx-cli --no-default-features --features rustls,postgres

      - name: Apply Database Migrations
        env:
          DATABASE_URL: postgres://storm:storm_secret@localhost:5432/storm_test
        run: sqlx migrate run --source migrations

      - name: Execute Integration Tests
        env:
          DATABASE_URL: postgres://storm:storm_secret@localhost:5432/storm_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: change-me-to-a-random-64-char-string-in-production
        run: cargo test --all --locked -- --include-ignored

  # Run code coverage analysis using cargo-llvm-cov and uploads the report to Codecov.
  coverage:
    name: Code Coverage & Report
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust Toolchain (llvm-cov)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache Cargo Dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Generate Coverage Report
        env:
          DATABASE_URL: postgres://storm:storm_secret@localhost:5432/storm_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: change-me-to-a-random-64-char-string-in-production
        run: cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info

      - name: Check Coverage Threshold
        run: |
          cargo llvm-cov --all-features --workspace --summary-only > coverage.txt
          COVERAGE=$(awk '/^total:/ {print $2}' coverage.txt | sed 's/%//')
          echo "Coverage: $COVERAGE%"
          if (( $(echo "$COVERAGE < 80" | bc -l) )); then
            echo "Code coverage ($COVERAGE%) is below the required 80%."
            exit 1
          fi

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  # Build the project in release mode to verify that a production build succeeds after all tests pass.
  build:
    name: Build Release Binary
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo Dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build Project in Release Mode
        run: cargo build --release --locked --bin storm-api
